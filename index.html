<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Piano Launchpad</title>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #1a1a1a; font-family: sans-serif; }
        
        .pad { display: flex; position: relative; padding: 20px; background: #333; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        .key { cursor: pointer; position: relative; transition: all 0.07s; user-select: none; }

        /* Белые клавиши */
        .white {
            width: 50px;
            height: 200px;
            background: linear-gradient(to bottom, #eee 0%, #fff 100%);
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            z-index: 1;
        }
        .white:active, .white.playing {
            background: #e2e2e2;
            transform: translateY(4px);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Черные клавиши */
        .black {
            width: 30px;
            height: 120px;
            background: linear-gradient(to bottom, #444 0%, #000 100%);
            margin-left: -15px;
            margin-right: -15px;
            z-index: 2;
            border-radius: 0 0 3px 3px;
        }
        .black:active, .black.playing {
            background: #222;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

<div class="pad">
    <div class="key white" data-sound="./sounds/1.mp3"></div>
    <div class="key black" data-sound="./sounds/2.mp3"></div>
    <div class="key white" data-sound="./sounds/3.mp3"></div>
    <div class="key black" data-sound="./sounds/4.mp3"></div>
    <div class="key white" data-sound="./sounds/5.mp3"></div>
    <div class="key white" data-sound="./sounds/6.mp3"></div>
    <div class="key black" data-sound="./sounds/7.mp3"></div>
    <div class="key white" data-sound="./sounds/8.mp3"></div>
    <div class="key black" data-sound="./sounds/9.mp3"></div>
    <div class="key white" data-sound="./sounds/10.mp3"></div>
    <div class="key black" data-sound="./sounds/11.mp3"></div>
    <div class="key white" data-sound="./sounds/12.mp3"></div>
    
    <div class="key white" data-sound="./sounds/13.mp3"></div>
    <div class="key black" data-sound="./sounds/14.mp3"></div>
    <div class="key white" data-sound="./sounds/15.mp3"></div>
    <div class="key black" data-sound="./sounds/16.mp3"></div>
    <div class="key white" data-sound="./sounds/17.mp3"></div>
</div>

<script>
    // Находим ВСЕ элементы с классом .key
    const keys = document.querySelectorAll('.key');

    keys.forEach(key => {
        key.addEventListener('click', () => {
            playSound(key);
        });
    });

    function playSound(key) {
        const audioSrc = key.getAttribute('data-sound');
        const audio = new Audio(audioSrc);
        
        // Сбрасываем время, чтобы можно было кликать быстро много раз
        audio.currentTime = 0; 
        
        audio.play().catch(err => {
            console.error("Ошибка воспроизведения. Проверьте путь к файлу:", audioSrc);
        });

        // Визуальный эффект нажатия
        key.classList.add('playing');
        setTimeout(() => key.classList.remove('playing'), 100);
    }
</script>

</body>
</html>
